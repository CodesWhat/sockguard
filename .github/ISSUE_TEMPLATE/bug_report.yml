name: Bug Report
description: Report a bug in Sockguard
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Sockguard version
      description: Output of `sockguard version`
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Configure sockguard with ...
        2. Start a container that sends requests to the proxy
        3. See error in logs
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: sockguard.yaml, environment variables, or docker-compose snippet (redact secrets)
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (`SOCKGUARD_LOG_LEVEL=debug` helps)
      render: text
    validations:
      required: false

  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Docker Compose
        - Docker Run
        - Binary
        - Other
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker version
      description: Output of `docker version --format '{{.Server.Version}}'`
      placeholder: "e.g. 27.5.1"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: "e.g. Ubuntu 24.04 amd64, Synology DSM 7 arm64"
    validations:
      required: false
