version: 2

updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /app
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "📦 deps"
    labels:
      - dependencies
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      go-minor:
        update-types: [minor, patch]
      go-major:
        update-types: [major]

  # npm (root + workspaces)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "📦 deps"
    labels:
      - dependencies
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      npm-minor:
        update-types: [minor, patch]
      npm-major:
        update-types: [major]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "📦 deps"
    labels:
      - dependencies
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      actions-minor:
        update-types: [minor, patch]
      actions-major:
        update-types: [major]

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "📦 deps"
    labels:
      - dependencies
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      docker-minor:
        update-types: [minor, patch]
      docker-major:
        update-types: [major]
