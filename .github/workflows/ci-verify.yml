name: "✅ CI: Verify"
run-name: >-
  ${{
    github.event_name == 'schedule' && '✅ CI: Verify — Weekly schedule' ||
    github.event_name == 'pull_request' && format('✅ CI: Verify — PR #{0}', github.event.pull_request.number) ||
    format('✅ CI: Verify — {0}', github.ref_name)
  }}

on:
  push:
    branches: [main, 'release/*']
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: '30 6 * * 1'  # Weekly on Monday at 06:30 UTC

concurrency:
  group: ci-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zizmor:
    name: "🔒 Workflow Security"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read  # required by zizmor-action telemetry

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8  # v0.5.2
        with:
          token: ${{ github.token }}
          # impostor-commit audit requires API access that harden-runner blocks
          # in the zizmor container. Skip online audits to keep the scan offline.
          online-audits: false
          # SARIF upload to code scanning requires GHAS, not available on free
          # private repos. Re-enable when sockguard goes public.
          advanced-security: false

  codeql:
    name: "🔍 CodeQL Analysis"
    # CodeQL SARIF upload requires GitHub Advanced Security (GHAS), which is not
    # available on free private repos. Skip unless the repo is public.
    if: github.event.repository.visibility == 'public' && (github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        with:
          languages: go, javascript-typescript
          queries: security-and-quality

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: app/go.sum

      - name: Build Go
        run: go build ./...
        working-directory: app

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1

  dependency-review:
    name: "📦 Dependency Review"
    # Dependency Review requires GitHub Advanced Security on private repos.
    # Gated on public visibility so it auto-activates when the repo goes public.
    if: github.event.repository.visibility == 'public' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0

  commit-message:
    name: "💬 Commit Message"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # advisory — does not block merge

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          set -euo pipefail
          pattern='^[\xF0-\xF4].*|^[\xE2-\xEF].*'

          failed=0
          while IFS= read -r msg; do
            first_line="$(echo "${msg}" | head -n1)"
            if ! echo "${first_line}" | grep -qP '^(\p{So}|\p{Emoji_Presentation})+\s+\w+(\(\w[\w-]*\))?!?:\s.+$'; then
              echo "::warning::Non-conventional commit: ${first_line}"
              failed=1
            fi
          done < <(git log --format=%s origin/main..HEAD)

          if [ "${failed}" -eq 1 ]; then
            echo "::warning::Some commits don't follow emoji conventional format. Expected: <emoji> <type>(scope): description"
          fi

  goreleaser-check:
    name: "📦 GoReleaser Config"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: app/go.sum

      - name: Run GoReleaser check
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
        with:
          distribution: goreleaser
          version: latest
          args: check
          workdir: app

  go-lint:
    name: "🧹 Go Lint"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: app/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9  # v8.0.0
        with:
          working-directory: app

  go-test:
    name: "🧪 Go Test"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: app/go.sum

      - name: Run tests
        run: |
          go list ./... | grep -v '/internal/testcert$' | xargs go test -race -coverprofile=coverage.txt -covermode=atomic
        working-directory: app

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: go-coverage
          path: app/coverage.txt
          retention-days: 14

  go-fuzz:
    name: "🔀 Go Fuzz"
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: app/go.sum

      - name: Fuzz filter
        run: |
          go test -fuzz=FuzzPathMatch -fuzztime=30s ./internal/filter/
          go test -fuzz=FuzzGlobToRegex -fuzztime=30s ./internal/filter/
          go test -fuzz=FuzzNormalizePath -fuzztime=30s ./internal/filter/
          go test -fuzz=FuzzCompileRule -fuzztime=30s ./internal/filter/
        working-directory: app

      - name: Fuzz proxy
        run: |
          go test -fuzz=FuzzProxyHeadersAndBody -fuzztime=30s ./internal/proxy/
          go test -fuzz=FuzzHijackHeadersAndBody -fuzztime=30s ./internal/proxy/
        working-directory: app

  ts-lint:
    name: "🎨 Biome Lint"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Biome
        run: npx biome check .

  ts-test:
    name: "🧪 TS Test"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  ts-build:
    name: "🏗️ Build Workspaces"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: npx turbo build

  docker:
    name: "🐳 Docker Build"
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      # Single-arch build to verify Dockerfile builds correctly.
      # Multi-arch (amd64 + arm64) is handled by the release workflow.
      - name: Build (single-arch)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: sockguard:ci
          build-args: VERSION=ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
