name: "🔀 Quality: Deep Fuzz (monthly)"
run-name: >-
  ${{
    github.event_name == 'schedule' && '🔀 Quality: Deep Fuzz — Monthly schedule' ||
    format('🔀 Quality: Deep Fuzz — Monthly, manual by {0}', github.actor)
  }}

# Tier 3 of the fuzz strategy. Tier 1 lives in `ci-verify.yml go-fuzz`
# (60-second smoke per PR/push), Tier 2 in `quality-fuzz-nightly.yml`
# (15 minutes per fuzzer daily). This workflow gives every fuzzer a
# 1-hour coverage budget on the first day of each month so we get one
# very deep pass per month that can find paths the shorter tiers miss,
# plus on-demand longer runs via `workflow_dispatch` before a release.
#
# 1 hour per fuzzer × 8 fuzzers × matrix-parallel = ~1 hour wall time,
# ~8 runner-hours total. That's well within the free-tier budget for
# public repos and cheap insurance for a default-deny security proxy.
#
# Crashes are uploaded with 180-day retention so a failing input from
# an older monthly run stays recoverable long enough to turn into a
# committed regression test.

on:
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Per-fuzzer coverage budget (Go duration, e.g. 1h, 3h). Max ≈5h45m before the job timeout trims it."
        required: false
        default: "1h"
  schedule:
    - cron: '30 7 1 * *'  # Monthly on day 1 at 07:30 UTC

permissions:
  contents: read

concurrency:
  # Don't cancel an in-flight monthly when a manual dispatch fires — they
  # answer different questions and either can confirm health.
  group: quality-fuzz-monthly-${{ github.workflow }}-${{ github.event.inputs.fuzztime || 'scheduled' }}
  cancel-in-progress: false

jobs:
  monthly-fuzz:
    name: "🔀 Fuzz ${{ matrix.fuzzer.name }} (monthly)"
    runs-on: ubuntu-latest
    # 6-hour ceiling is the hard cap regardless of the fuzztime input.
    # Anything longer should run on a dedicated box, not a shared runner.
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        fuzzer:
          - { name: FuzzPathMatch,                 pkg: ./internal/filter/ }
          - { name: FuzzGlobToRegex,               pkg: ./internal/filter/ }
          - { name: FuzzNormalizePath,             pkg: ./internal/filter/ }
          - { name: FuzzCompileRule,               pkg: ./internal/filter/ }
          - { name: FuzzLoadYAML,                  pkg: ./internal/config/ }
          - { name: FuzzProxyHeadersAndBody,       pkg: ./internal/proxy/ }
          - { name: FuzzHijackHeadersAndBody,      pkg: ./internal/proxy/ }
          - { name: FuzzHijackBidirectionalStream, pkg: ./internal/proxy/ }

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Resolve fuzz budget
        id: budget
        env:
          INPUT_FUZZTIME: ${{ github.event.inputs.fuzztime }}
        run: |
          FUZZTIME="${INPUT_FUZZTIME:-1h}"
          source scripts/fuzz-duration.sh
          TEST_TIMEOUT="$(fuzz_timeout_for_budget "${FUZZTIME}" 600)" || exit 1
          echo "fuzztime=${FUZZTIME}" >> "$GITHUB_OUTPUT"
          echo "test_timeout=${TEST_TIMEOUT}" >> "$GITHUB_OUTPUT"
          echo "Running ${{ matrix.fuzzer.name }} for ${FUZZTIME} with ${TEST_TIMEOUT} watchdog"

      - name: Fuzz ${{ matrix.fuzzer.name }}
        working-directory: app
        env:
          FUZZER: ${{ matrix.fuzzer.name }}
          PKG: ${{ matrix.fuzzer.pkg }}
          FUZZTIME: ${{ steps.budget.outputs.fuzztime }}
          TEST_TIMEOUT: ${{ steps.budget.outputs.test_timeout }}
        run: |
          # TEST_TIMEOUT is FUZZTIME plus a cushion, so hung inputs produce
          # Go's goroutine dump before the job-level ceiling fires.
          go test -run='^$' \
            -fuzz="^${FUZZER}\$" \
            -fuzztime="${FUZZTIME}" \
            -timeout="${TEST_TIMEOUT}" \
            "${PKG}"

      - name: Upload fuzz corpus on failure or cancel
        # `cancelled()` covers manual cancels and job-level timeout-minutes
        # kills, both of which signal a wedged fuzzer whose corpus is worth
        # preserving — same as a normal crash.
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-corpus-monthly-${{ matrix.fuzzer.name }}-${{ github.run_id }}
          path: app/internal/**/testdata/fuzz/${{ matrix.fuzzer.name }}/
          retention-days: 180
          if-no-files-found: ignore

      - name: Summarize
        if: always()
        env:
          FUZZER: ${{ matrix.fuzzer.name }}
          PKG: ${{ matrix.fuzzer.pkg }}
          FUZZTIME: ${{ steps.budget.outputs.fuzztime }}
          TEST_TIMEOUT: ${{ steps.budget.outputs.test_timeout }}
          STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "### ${FUZZER} (monthly)"
            echo ""
            echo "- Package: \`${PKG}\`"
            echo "- Budget:  ${FUZZTIME}"
            echo "- Timeout: ${TEST_TIMEOUT}"
            echo "- Result:  ${STATUS}"
            echo ""
            if [ "${STATUS}" = "failure" ]; then
              echo "A crashing input was saved to \`testdata/fuzz/${FUZZER}/\`"
              echo "and uploaded as \`fuzz-corpus-monthly-${FUZZER}-${RUN_ID}\`"
              echo "(180-day retention). Triage: download, commit the minimized input"
              echo "to the seed corpus, fix the regression, push."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
