name: "🔀 Quality: Deep Fuzz"
run-name: >-
  ${{
    github.event_name == 'schedule' && '🔀 Quality: Deep Fuzz — Nightly' ||
    format('🔀 Quality: Deep Fuzz — Manual by {0}', github.actor)
  }}

# Tier 2 of the fuzz strategy. Tier 1 lives in `ci-verify.yml go-fuzz` and
# gives every fuzzer a 60-second budget on every PR/push to main so obvious
# regressions fail fast. This workflow is where the deep coverage work
# happens: 15 minutes per fuzzer by default (overridable via
# `workflow_dispatch` input up to the job `timeout-minutes` cap), every
# fuzzer in the suite, matrix-parallelized across runners so the whole
# thing finishes in ~15 minutes of wall time.
#
# Two fuzzers ride exclusively in this tier for now — `FuzzLoadYAML` and
# `FuzzHijackBidirectionalStream` have never run in CI before, and surfacing
# their first-ever crashes through a nightly schedule instead of a blocking
# PR check keeps merges unblocked while we triage anything they find.
#
# Crashes are uploaded as artifacts with 90-day retention so the failing
# input is recoverable. The triage workflow is: download the artifact,
# commit the minimized input under `app/internal/<pkg>/testdata/fuzz/<Fuzz*>/`
# so it enters the seed corpus for all future runs, fix the bug, push.

on:
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Per-fuzzer coverage budget (Go duration, e.g. 15m, 1h). Max ≈55m before the job timeout trims it."
        required: false
        default: "15m"
  schedule:
    - cron: '30 9 * * *'  # Daily at 09:30 UTC (quiet window before US/EU start-of-day)

permissions:
  contents: read

concurrency:
  # Don't cancel an in-flight nightly when a manual dispatch kicks off — the
  # two runs answer different questions and either can confirm health.
  group: quality-fuzz-${{ github.workflow }}-${{ github.event.inputs.fuzztime || 'scheduled' }}
  cancel-in-progress: false

jobs:
  deep-fuzz:
    name: "🔀 Fuzz ${{ matrix.fuzzer.name }}"
    runs-on: ubuntu-latest
    # Job-level cap is the hard ceiling regardless of what -fuzztime asks
    # for. Keep it comfortably above the default 15m + setup overhead and
    # above the longest documented manual budget plus the fuzz watchdog
    # cushion.
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        fuzzer:
          - { name: FuzzPathMatch,                 pkg: ./internal/filter/ }
          - { name: FuzzGlobToRegex,               pkg: ./internal/filter/ }
          - { name: FuzzGlobToRegexString,         pkg: ./internal/filter/ }
          - { name: FuzzNormalizePath,             pkg: ./internal/filter/ }
          - { name: FuzzCompileRule,               pkg: ./internal/filter/ }
          - { name: FuzzBuild,                     pkg: ./internal/filter/ }
          - { name: FuzzContainerCreate,           pkg: ./internal/filter/ }
          - { name: FuzzExec,                      pkg: ./internal/filter/ }
          - { name: FuzzImagePull,                 pkg: ./internal/filter/ }
          - { name: FuzzVolume,                    pkg: ./internal/filter/ }
          - { name: FuzzSecret,                    pkg: ./internal/filter/ }
          - { name: FuzzConfigWrite,               pkg: ./internal/filter/ }
          - { name: FuzzService,                   pkg: ./internal/filter/ }
          - { name: FuzzSwarm,                     pkg: ./internal/filter/ }
          - { name: FuzzPlugin,                    pkg: ./internal/filter/ }
          - { name: FuzzNetwork,                   pkg: ./internal/filter/ }
          - { name: FuzzLoadYAML,                  pkg: ./internal/config/ }
          - { name: FuzzProxyHeadersAndBody,       pkg: ./internal/proxy/ }
          - { name: FuzzHijackHeadersAndBody,      pkg: ./internal/proxy/ }
          - { name: FuzzHijackBidirectionalStream, pkg: ./internal/proxy/ }

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Resolve fuzz budget
        id: budget
        env:
          INPUT_FUZZTIME: ${{ github.event.inputs.fuzztime }}
        run: |
          FUZZTIME="${INPUT_FUZZTIME:-15m}"
          source scripts/fuzz-duration.sh
          TEST_TIMEOUT="$(fuzz_timeout_for_budget "${FUZZTIME}" 600)" || exit 1
          echo "fuzztime=${FUZZTIME}" >> "$GITHUB_OUTPUT"
          echo "test_timeout=${TEST_TIMEOUT}" >> "$GITHUB_OUTPUT"
          echo "Running ${{ matrix.fuzzer.name }} for ${FUZZTIME} with ${TEST_TIMEOUT} watchdog"

      - name: Fuzz ${{ matrix.fuzzer.name }}
        working-directory: app
        env:
          FUZZER: ${{ matrix.fuzzer.name }}
          PKG: ${{ matrix.fuzzer.pkg }}
          FUZZTIME: ${{ steps.budget.outputs.fuzztime }}
          TEST_TIMEOUT: ${{ steps.budget.outputs.test_timeout }}
        run: |
          # -run=^$ skips normal unit tests in the package so only the fuzz
          # driver runs. TEST_TIMEOUT is FUZZTIME plus a cushion, so hangs
          # produce Go's goroutine dump before the job-level ceiling fires.
          go test -run='^$' \
            -fuzz="^${FUZZER}\$" \
            -fuzztime="${FUZZTIME}" \
            -timeout="${TEST_TIMEOUT}" \
            "${PKG}"

      - name: Upload fuzz corpus on failure or cancel
        # `cancelled()` covers manual cancels and job-level timeout-minutes
        # kills, both of which signal a wedged fuzzer whose corpus is worth
        # preserving — same as a normal crash.
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.fuzzer.name }}-${{ github.run_id }}
          path: app/internal/**/testdata/fuzz/${{ matrix.fuzzer.name }}/
          retention-days: 90
          if-no-files-found: ignore

      - name: Summarize
        if: always()
        env:
          FUZZER: ${{ matrix.fuzzer.name }}
          PKG: ${{ matrix.fuzzer.pkg }}
          FUZZTIME: ${{ steps.budget.outputs.fuzztime }}
          TEST_TIMEOUT: ${{ steps.budget.outputs.test_timeout }}
          STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "### ${FUZZER}"
            echo ""
            echo "- Package: \`${PKG}\`"
            echo "- Budget:  ${FUZZTIME}"
            echo "- Timeout: ${TEST_TIMEOUT}"
            echo "- Result:  ${STATUS}"
            echo ""
            if [ "${STATUS}" = "failure" ]; then
              echo "A crashing input was saved to \`testdata/fuzz/${FUZZER}/\`"
              echo "and uploaded as artifact"
              echo "\`fuzz-corpus-${FUZZER}-${RUN_ID}\`."
              echo "Download it, commit the minimized input to the seed corpus,"
              echo "fix the regression, and push."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
