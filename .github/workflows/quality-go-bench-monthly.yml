name: "⚡ Quality: Go Benchmarks"
run-name: >-
  ${{
    github.event_name == 'schedule' && '⚡ Quality: Benchmarks — Monthly schedule' ||
    format('⚡ Quality: Benchmarks — Manual by {0}', github.actor)
  }}

# Monthly quality signal: run benchmarks to catch performance regressions.
# Deep fuzzing lives in quality-fuzz-monthly.yml (every fuzzer, 1h each).
on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 1 * *'  # Monthly on day 1 at 06:15 UTC

permissions:
  contents: read

concurrency:
  group: quality-monthly-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: "📊 Quality: Go Benchmarks"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: app/go.mod

      - name: Run benchmarks
        working-directory: app
        run: |
          go test -bench=. -benchmem -count=5 -timeout=20m ./... | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: benchmark-results-${{ github.run_id }}
          path: app/benchmark-results.txt
          retention-days: 90

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Go Benchmarks"
            echo '```'
            grep -E '^Benchmark' app/benchmark-results.txt | head -50 || echo "No benchmark results"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
