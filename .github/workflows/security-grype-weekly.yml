name: "🛡️ Security: Grype & Govulncheck"
run-name: >-
  ${{
    github.event_name == 'schedule' && '🛡️ Security: Grype & Govulncheck — Weekly run' ||
    format('🛡️ Security: Grype & Govulncheck — Manual by {0}', github.actor)
  }}

on:
  workflow_dispatch:
  schedule:
    - cron: '15 7 * * 1'  # Weekly on Monday at 07:15 UTC

permissions:
  contents: read

env:
  GOVULNCHECK_VERSION: v1.2.0

concurrency:
  group: security-weekly-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: "🔍 Security: Govulncheck"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: app/go.mod

      - name: Install govulncheck
        run: go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

      - name: Run govulncheck
        working-directory: app
        run: govulncheck ./...

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Govulncheck"
            echo "- Scanned Go dependencies for known vulnerabilities"
            echo "- Tool version: ${GOVULNCHECK_VERSION}"
            echo "- Database: Go Vulnerability Database (vuln.go.dev)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype-image:
    name: "🐳 Security: Grype Container Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build image for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: sockguard:grype-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype
        with:
          image: sockguard:grype-scan
          severity-cutoff: high
          fail-build: true
          output-format: sarif

      - name: Upload Grype SARIF to code scanning
        # Code scanning uploads require GHAS, not available on free private repos.
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Grype Container Scan"
            echo "- Scanned container image for HIGH and CRITICAL CVEs"
            echo "- Base image: Wolfi (Chainguard)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype-sbom:
    name: "📦 Security: Grype Go Module Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Grype on source directory
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype-src
        with:
          path: app/
          severity-cutoff: high
          fail-build: true
          output-format: sarif

      - name: Upload Grype source SARIF
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: ${{ steps.grype-src.outputs.sarif }}

  gosec:
    name: "🔐 Security: Gosec SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Gosec
        uses: securego/gosec@4a3bd8af174872c778439083ded7adbf3747e770  # v2.26.1
        with:
          args: -fmt sarif -out gosec-results.sarif ./app/...

      - name: Upload Gosec SARIF
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: gosec-results.sarif

  testssl:
    # QA-4's DAST-class drift detector for the production mTLS posture:
    # builds sockguard with the same config builder the proxy ships with,
    # opens a real TCP+TLS listener, drives drwetter/testssl.sh against
    # it, and fails the job on HIGH or CRITICAL findings. Internal tests
    # pin the config at the code level (TestMutualTLSEdgeCases, the
    # builder unit tests); this catches the case where someone weakens
    # the wire posture from production config or a future env var that
    # the code-level tests would not exercise.
    name: "🔒 Security: testssl.sh (sockguard TLS posture)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: app/go.mod

      - name: Pull testssl.sh image
        run: docker pull drwetter/testssl.sh:3.2

      - name: Run testssl.sh against a sockguard TLS listener
        run: scripts/security-testssl.sh

      - name: Upload testssl.sh output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: testssl-output-${{ github.run_id }}
          path: |
            testssl-output.json
            testssl-output.txt
          if-no-files-found: ignore
          retention-days: 90

      - name: Summarize
        if: always()
        run: |
          {
            echo "### testssl.sh sockguard TLS posture"
            echo "- Probed a sockguard TCP+TLS listener with the production config builder"
            echo "- Fails on any HIGH or CRITICAL finding"
            echo "- Tool: drwetter/testssl.sh:3.2 (DAST-class)"
          } >> "$GITHUB_STEP_SUMMARY"
