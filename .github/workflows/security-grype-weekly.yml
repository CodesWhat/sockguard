name: "🛡️ Security: Grype & Govulncheck"
run-name: >-
  ${{
    github.event_name == 'schedule' && '🛡️ Security: Grype & Govulncheck — Weekly run' ||
    format('🛡️ Security: Grype & Govulncheck — Manual by {0}', github.actor)
  }}

on:
  workflow_dispatch:
  schedule:
    - cron: '15 7 * * 1'  # Weekly on Monday at 07:15 UTC

permissions:
  contents: read

concurrency:
  group: security-weekly-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: "🔍 Security: Govulncheck"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v6.0.2
        with:
          go-version-file: app/go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: app
        run: govulncheck ./...

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Govulncheck"
            echo "- Scanned Go dependencies for known vulnerabilities"
            echo "- Database: Go Vulnerability Database (vuln.go.dev)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype-image:
    name: "🐳 Security: Grype Container Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build image for scanning
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: sockguard:grype-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@abae793926ec39a8ab1d15000540ee3a5e8febed  # v6.2.0
        id: grype
        with:
          image: sockguard:grype-scan
          severity-cutoff: high
          fail-build: true
          output-format: sarif

      - name: Upload Grype SARIF to code scanning
        # Code scanning uploads require GHAS, not available on free private repos.
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Grype Container Scan"
            echo "- Scanned container image for HIGH and CRITICAL CVEs"
            echo "- Base image: Wolfi (Chainguard)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype-sbom:
    name: "📦 Security: Grype Go Module Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Grype on source directory
        uses: anchore/scan-action@abae793926ec39a8ab1d15000540ee3a5e8febed  # v6.2.0
        id: grype-src
        with:
          path: app/
          severity-cutoff: high
          fail-build: true
          output-format: sarif

      - name: Upload Grype source SARIF
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        with:
          sarif_file: ${{ steps.grype-src.outputs.sarif }}

  gosec:
    name: "🔐 Security: Gosec SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Gosec
        uses: securego/gosec@26e57d6b340778c2983e1ca93bc2ef44e3e0b757  # v2.22.4
        with:
          args: -fmt sarif -out gosec-results.sarif ./...
          working-directory: app

      - name: Upload Gosec SARIF
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        with:
          sarif_file: app/gosec-results.sarif
