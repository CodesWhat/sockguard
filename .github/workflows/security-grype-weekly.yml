name: "🛡️ Security: Grype & Govulncheck"
run-name: >-
  ${{
    github.event_name == 'schedule' && '🛡️ Security: Grype & Govulncheck — Weekly run' ||
    format('🛡️ Security: Grype & Govulncheck — Manual by {0}', github.actor)
  }}

on:
  workflow_dispatch:
  schedule:
    - cron: '15 7 * * 1'  # Weekly on Monday at 07:15 UTC

permissions:
  contents: read

env:
  GOVULNCHECK_VERSION: v1.2.0

concurrency:
  group: security-weekly-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: "🔍 Security: Govulncheck"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: app/go.mod

      - name: Install govulncheck
        run: go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

      - name: Run govulncheck
        working-directory: app
        run: govulncheck ./...

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Govulncheck"
            echo "- Scanned Go dependencies for known vulnerabilities"
            echo "- Tool version: ${GOVULNCHECK_VERSION}"
            echo "- Database: Go Vulnerability Database (vuln.go.dev)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype-image:
    name: "🐳 Security: Grype Container Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build image for scanning
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: sockguard:grype-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype
        with:
          image: sockguard:grype-scan
          severity-cutoff: high
          fail-build: true
          output-format: sarif

      - name: Upload Grype SARIF to code scanning
        # Code scanning uploads require GHAS, not available on free private repos.
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Summarize
        if: always()
        run: |
          {
            echo "### Grype Container Scan"
            echo "- Scanned container image for HIGH and CRITICAL CVEs"
            echo "- Base image: Wolfi (Chainguard)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype-sbom:
    name: "📦 Security: Grype Go Module Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Grype on source directory
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype-src
        with:
          path: app/
          severity-cutoff: high
          fail-build: true
          output-format: sarif

      - name: Upload Grype source SARIF
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3
        with:
          sarif_file: ${{ steps.grype-src.outputs.sarif }}

  gosec:
    name: "🔐 Security: Gosec SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Gosec
        uses: securego/gosec@4a3bd8af174872c778439083ded7adbf3747e770  # v2.26.1
        with:
          args: -fmt sarif -out gosec-results.sarif ./app/...

      - name: Upload Gosec SARIF
        if: always() && github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3
        with:
          sarif_file: gosec-results.sarif
