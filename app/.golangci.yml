version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (net.Conn).Close
        - (net.Listener).Close
        - (*net/http.Server).Close
        - (*net/http.Server).Serve

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
