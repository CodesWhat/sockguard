# Sockguard — Autoheal Preset
#
# Minimal access for docker-autoheal (willfarrell/docker-autoheal).
# Allows: container list (to find unhealthy), restart (to heal).
# This is the most restrictive write preset — only restart, nothing else.

upstream:
  socket: /var/run/docker.sock

log:
  level: info
  format: json
  access_log: true

health:
  enabled: true
  path: /health

rules:
  # Health and metadata
  - match: { method: GET, path: "/_ping" }
    action: allow
  - match: { method: HEAD, path: "/_ping" }
    action: allow
  - match: { method: GET, path: "/version" }
    action: allow
  - match: { method: GET, path: "/events" }
    action: allow

  # Container list and inspect (autoheal reads health status from inspect)
  - match: { method: GET, path: "/containers/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/json" }
    action: allow

  # Container restart (the only write operation autoheal needs)
  - match: { method: POST, path: "/containers/*/restart" }
    action: allow

  # Deny everything else
  - match: { method: "*", path: "/**" }
    action: deny
    reason: "not allowed by autoheal preset — restart only"
