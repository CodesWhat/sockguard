# Sockguard — Drydock with Self-Update Preset
#
# Extends the drydock preset with the exec paths required for drydock's
# self-update finalize flow. Use this instead of drydock.yaml when drydock
# is configured to update itself through the sockguard proxy.
#
# Self-update exec flow (source: drydock/app/triggers/providers/docker/):
#   1. drydock creates the replacement container (already covered by drydock.yaml)
#   2. drydock issues the stop/start/wait lifecycle calls directly through the
#      proxy (covered by the lifecycle rules) — current drydock does not spawn a
#      separate helper container for the transition
#   3. runFinalizeCallbackInContainer(): POST /containers/{id}/exec creates an
#      exec INSIDE the new drydock container with Cmd: ['node',
#      'dist/triggers/providers/docker/self-update-finalize-entrypoint.js'];
#      POST /exec/{id}/start runs it (Detach: false, Tty: false);
#      GET /exec/{id}/json confirms the exit code
#   4. The finalize entrypoint POSTs an HTTP callback to drydock's internal API
#      (DD_SELF_UPDATE_FINALIZE_URL, typically http://127.0.0.1:3000/…) — that
#      call leaves the proxy, so no extra sockguard rule is needed
#
# Security tradeoff: the exec paths below are pinned to the single finalize
# command argv via allowed_commands. This prevents any other exec invocation
# even if drydock attempted one. If your drydock build uses a different Node
# entrypoint path, update allowed_commands to match.
# allow_root_user must be true here: drydock's exec create body sets no User
# field, and sockguard conservatively treats an empty exec User as root (it
# cannot see the image's USER — Docker does not echo it into the exec
# ProcessConfig). With allow_root_user false the finalize exec is denied before
# allowed_commands is ever checked. Safety is preserved by the exact-argv pin:
# only the one finalize command can run, as the container's own (nonroot) user.
#
# Expanded API surface vs. drydock.yaml:
#   + POST /containers/{id}/exec  — create exec for finalize callback
#   + POST /exec/{id}/start       — run the finalize entrypoint
#   + GET  /exec/{id}/json        — inspect exit code after finalize
#
# Container bind-mounts: in socket mode drydock bind-mounts the Docker socket
# (typically /var/run/docker.sock), and the replacement container it creates
# during self-update carries that same bind. allowed_bind_mounts lists the path
# so sockguard does not block the recreate. If drydock reaches the daemon over
# TCP (no socket bind) you can set allowed_bind_mounts back to an empty list.

upstream:
  socket: /var/run/docker.sock

log:
  level: info
  format: json
  access_log: true

health:
  enabled: true
  path: /health

# Drydock's update flow inspects the running container, then submits the
# inspect payload back to dockerd via POST /containers/create. Redactions must
# be off so HostConfig.Binds / Config.Env / NetworkSettings pass through
# intact — same reasoning as drydock.yaml.
response:
  redact_mount_paths: false
  redact_container_env: false
  redact_network_topology: false

# Container-create inspection: in socket mode drydock (and the replacement
# container it recreates during self-update) bind-mounts the Docker socket
# (e.g. /var/run/docker.sock:/var/run/docker.sock), so that source path is
# listed in allowed_bind_mounts below. If drydock reaches the daemon via TCP
# (no local socket bind) you can set allowed_bind_mounts back to []. The
# allowed_commands list pins the finalize exec to an EXACT argv — sockguard's
# exec matcher requires the same token count and every token to match, so any
# other Cmd (extra trailing args included) is denied even though the rule allows
# POST /containers/*/exec.
request_body:
  container_create:
    allowed_bind_mounts:
      - /var/run/docker.sock
    allowed_runtimes:
      - runc
  exec:
    allow_privileged: false
    # See the allow_root_user note in the header: drydock sets no exec User and
    # sockguard treats an empty User as root, so this must be true for the
    # finalize exec to run. The exact-argv allowed_commands pin keeps it safe.
    allow_root_user: true
    allowed_commands:
      - ["node", "dist/triggers/providers/docker/self-update-finalize-entrypoint.js"]
  image_pull:
    allow_all_registries: true

rules:
  # Health and metadata
  - match: { method: GET, path: "/_ping" }
    action: allow
  - match: { method: HEAD, path: "/_ping" }
    action: allow
  - match: { method: GET, path: "/version" }
    action: allow
  - match: { method: GET, path: "/info" }
    action: allow
  - match: { method: GET, path: "/events" }
    action: allow

  # Container reads — narrow set drydock needs (list + inspect + stats).
  # Deliberately omits /containers/*/logs, /archive, /export, /attach to
  # keep the exfiltration validator happy.
  - match: { method: GET, path: "/containers/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/stats" }
    action: allow
  - match: { method: GET, path: "/containers/*/top" }
    action: allow
  - match: { method: GET, path: "/containers/*/changes" }
    action: allow

  # Container lifecycle
  - match: { method: POST, path: "/containers/*/start" }
    action: allow
  - match: { method: POST, path: "/containers/*/stop" }
    action: allow
  - match: { method: POST, path: "/containers/*/restart" }
    action: allow
  - match: { method: POST, path: "/containers/*/kill" }
    action: allow
  - match: { method: POST, path: "/containers/*/rename" }
    action: allow
  - match: { method: POST, path: "/containers/*/update" }
    action: allow
  - match: { method: POST, path: "/containers/*/wait" }
    action: allow
  - match: { method: DELETE, path: "/containers/*" }
    action: allow

  # Container creation (for updates and the self-update helper container)
  - match: { method: POST, path: "/containers/create" }
    action: allow

  # Exec — body-inspected per request_body.exec above. The allowed_commands
  # list restricts exec to the finalize entrypoint only. POST /exec/*/start
  # is a raw HTTP/1.1 upgrade (Detach: false, Tty: false for the finalize path).
  - match: { method: POST, path: "/containers/*/exec" }
    action: allow
  - match: { method: POST, path: "/exec/*/start" }
    action: allow
  - match: { method: GET, path: "/exec/*/json" }
    action: allow

  # Image reads — list + inspect + history.
  - match: { method: GET, path: "/images/json" }
    action: allow
  - match: { method: GET, path: "/images/**/json" }
    action: allow
  - match: { method: GET, path: "/images/**/history" }
    action: allow
  - match: { method: POST, path: "/images/create" }
    action: allow
  - match: { method: DELETE, path: "/images/**" }
    action: allow

  # Network read — list + inspect. Plus connect: drydock attaches the recreated
  # container to its extra networks via POST /networks/{id}/connect when the
  # container belongs to more than one network.
  - match: { method: GET, path: "/networks" }
    action: allow
  - match: { method: GET, path: "/networks/*" }
    action: allow
  - match: { method: POST, path: "/networks/*/connect" }
    action: allow

  # Volume read — list + inspect only.
  - match: { method: GET, path: "/volumes" }
    action: allow
  - match: { method: GET, path: "/volumes/*" }
    action: allow

  # Distribution (registry digest checks for image freshness).
  - match: { method: GET, path: "/distribution/**/json" }
    action: allow

  # Swarm services — list + inspect.
  - match: { method: GET, path: "/services" }
    action: allow
  - match: { method: GET, path: "/services/*" }
    action: allow

  # Deny everything else
  - match: { method: "*", path: "/**" }
    action: deny
    reason: "not allowed by drydock-with-selfupdate preset"
