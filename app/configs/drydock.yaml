# Sockguard — Drydock Preset
#
# Optimized for the drydock container update manager.
# Allows: container lifecycle (start/stop/restart/kill/rename/update/wait/create/remove),
#         image pull/inspect/remove, /events, narrow network/volume/distribution
#         reads, Swarm services. Reads are enumerated path-by-path so this
#         preset stays clean under sockguard's exfiltration validator without
#         needing insecure_allow_read_exfiltration: true.
# Denies: exec, build, secrets, plugins, raw archive/export/logs/attach streams.
#
# Self-update: the rename/create call that replaces Drydock's own container
# goes directly through this proxy (source:
# drydock/app/triggers/providers/docker/SelfUpdateTransitionShared.ts). As of
# drydock dev/v1.6, Drydock then spawns a separate, AutoRemove, ephemeral
# helper container ("drydock-self-update-<ts>", labeled dd.self-update.helper)
# that reuses the same Docker socket bind and itself issues the
# stop-old/start-new/health-poll/finalize-exec/remove-old sequence
# (self-update-controller.ts) — it is the HELPER, not Drydock's own process,
# that calls exec. The replacement container is created through the proxy
# carrying Drydock's own volumes, so its host path must be listed under
# request_body.container_create.allowed_bind_mounts. The helper finalizes via
# a `docker exec` INSIDE the new container (runFinalizeCallbackInContainer),
# which this preset denies — the update container still starts, but Drydock's
# self-update state stays pending instead of being marked complete. For a
# clean finalize use the drydock-with-selfupdate.yaml preset, which
# allowlists exactly that exec argv.

upstream:
  socket: /var/run/docker.sock

log:
  level: info
  format: json
  access_log: true

health:
  enabled: true
  path: /health

# Drydock's update flow inspects the running container, then submits the
# inspect payload back to dockerd via POST /containers/create. If sockguard
# redacts HostConfig.Binds / Config.Env / NetworkSettings to "<redacted>" in
# the inspect response, drydock faithfully forwards that placeholder string
# into the create body and dockerd rejects it (400 "includes invalid
# characters for a local volume name"). Disable all three response
# redactions for this preset — they are mutually exclusive with the
# auto-updater use case this preset is designed for.
response:
  redact_mount_paths: false
  redact_container_env: false
  redact_network_topology: false

# Drydock needs container creation during update flows. Container-create bodies
# are inspected by default, but bind-mounted workloads are denied until you
# allowlist their host paths here. Image pulls are inspected too; this preset
# explicitly allows any registry so Drydock can continue tracking arbitrary
# images while still denying `fromSrc` imports. Container updates are inspected
# too; restart-policy/resource-control/device/capability changes stay denied
# unless you explicitly allow them under request_body.container_update.
request_body:
  container_create:
    allowed_bind_mounts: []
    # Drydock recreates a container from its own inspect spec, which on most
    # daemons carries an explicit HostConfig.Runtime ("runc"). Sockguard's
    # allowed_runtimes allowlist denies a non-empty runtime unless it is
    # listed (an empty/unset runtime selects the daemon default and is always
    # allowed), so without this entry every update is rejected at
    # POST /containers/create with 403 "runtime \"runc\" is not allowlisted"
    # and drydock rolls the update back. Allow the stock runtime only.
    allowed_runtimes:
      - runc
  image_pull:
    allow_all_registries: true

rules:
  # Health and metadata
  - match: { method: GET, path: "/_ping" }
    action: allow
  - match: { method: HEAD, path: "/_ping" }
    action: allow
  - match: { method: GET, path: "/version" }
    action: allow
  - match: { method: GET, path: "/info" }
    action: allow
  - match: { method: GET, path: "/events" }
    action: allow

  # Container reads — narrow set drydock needs (list + inspect + stats).
  # Deliberately omits /containers/*/logs, /archive, /export, /attach to
  # keep the exfiltration validator happy.
  - match: { method: GET, path: "/containers/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/stats" }
    action: allow
  - match: { method: GET, path: "/containers/*/top" }
    action: allow
  - match: { method: GET, path: "/containers/*/changes" }
    action: allow

  # Container lifecycle
  - match: { method: POST, path: "/containers/*/start" }
    action: allow
  - match: { method: POST, path: "/containers/*/stop" }
    action: allow
  - match: { method: POST, path: "/containers/*/restart" }
    action: allow
  - match: { method: POST, path: "/containers/*/kill" }
    action: allow
  - match: { method: POST, path: "/containers/*/rename" }
    action: allow
  - match: { method: POST, path: "/containers/*/update" }
    action: allow
  - match: { method: POST, path: "/containers/*/wait" }
    action: allow
  - match: { method: DELETE, path: "/containers/*" }
    action: allow

  # Container creation (for updates)
  - match: { method: POST, path: "/containers/create" }
    action: allow

  # Image reads — list + inspect + history. Image names can be namespaced
  # (linuxserver/qbittorrent:latest, ghcr.io/owner/repo:tag), so the
  # middle is matched with `**`. The trailing /json or /history segment
  # keeps the exfiltration validator happy by not matching /images/get
  # or /images/*/get (raw tarball exfil).
  - match: { method: GET, path: "/images/json" }
    action: allow
  - match: { method: GET, path: "/images/**/json" }
    action: allow
  - match: { method: GET, path: "/images/**/history" }
    action: allow
  - match: { method: POST, path: "/images/create" }
    action: allow
  - match: { method: DELETE, path: "/images/**" }
    action: allow

  # Network read — list + inspect. Plus connect: when the recreated container
  # belongs to more than one network, drydock attaches the extra networks via
  # POST /networks/{id}/connect (the create body only carries the first network).
  - match: { method: GET, path: "/networks" }
    action: allow
  - match: { method: GET, path: "/networks/*" }
    action: allow
  - match: { method: POST, path: "/networks/*/connect" }
    action: allow

  # Volume read — list + inspect only.
  - match: { method: GET, path: "/volumes" }
    action: allow
  - match: { method: GET, path: "/volumes/*" }
    action: allow

  # Distribution (registry digest checks for image freshness). Image
  # references in the URL can be multi-segment (registry/owner/repo:tag).
  - match: { method: GET, path: "/distribution/**/json" }
    action: allow

  # Swarm services — list + inspect. /services/*/logs is intentionally
  # omitted to keep the exfiltration validator happy.
  - match: { method: GET, path: "/services" }
    action: allow
  - match: { method: GET, path: "/services/*" }
    action: allow

  # Deny everything else
  - match: { method: "*", path: "/**" }
    action: deny
    reason: "not allowed by drydock preset"
