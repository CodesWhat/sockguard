# Sockguard — GitLab Runner (Docker Executor) Preset
#
# For gitlab-runner configured with executor = "docker" in config.toml. In this
# mode the runner daemon spawns one or more containers per CI job: a "build"
# container that receives the job script via exec injection, optional "service"
# containers (postgres, redis, etc.) declared in .gitlab-ci.yml, and a
# "helper" container that handles git clone, cache, and artifact upload. Each
# of those containers is created and destroyed by the runner process through
# the Docker API. This preset sits between the runner and dockerd, enforcing a
# default-deny posture so that a compromised job image or a malicious
# .gitlab-ci.yml cannot escalate to host compromise through the socket.
#
# Allows:
#   - Container lifecycle: create, start, stop, kill, wait, remove
#   - Exec (job-step injection + shell sessions): POST /containers/*/exec,
#     POST /exec/*/start, GET /exec/*/json
#   - Attach (log streaming): POST /containers/*/attach
#   - Container reads: list, inspect, logs, stats, top, changes
#   - Image pull (/images/create) from any registry — CI jobs pull arbitrary
#     images; image list + inspect + history reads
#   - Network lifecycle: create, delete, connect, disconnect, list, inspect
#   - Volume lifecycle: create, delete, list, inspect — for named cache +
#     builds volumes
#   - Events, ping, version, info
#
# Denies:
#   - Privileged containers (allow_privileged: false) — see security note below
#   - Host network/PID/IPC/user-namespace sharing
#   - Bind mounts (allowed_bind_mounts: []) — runner should use named volumes;
#     populate this list if your runner config genuinely needs host-path mounts
#   - All capability additions (allowed_capabilities: []) — expand only if a
#     specific job type requires e.g. SYS_PTRACE for debug builds
#   - Unconfined seccomp and AppArmor profiles
#   - Privileged exec (exec.allow_privileged: false)
#   - Image build, swarm, secrets, configs, plugins, raw tarball export/import
#
# Security note — privileged = true runner mode:
#   GitLab runner's config.toml supports `privileged = true` to enable
#   Docker-in-Docker (DinD) workflows. This preset deliberately rejects any
#   container_create body that sets HostConfig.Privileged=true: the proxy
#   returns 403 before dockerd acts on the request. Operators who need DinD
#   must either remove the `privileged = true` flag from config.toml and use
#   the rootless or sysbox-based DinD approach, or accept that DinD jobs will
#   fail through the proxy. The trade-off is intentional — privileged containers
#   bypass virtually every Linux security boundary and are incompatible with a
#   meaningful host-isolation posture.
#
# Authentication note:
#   This preset enforces job-level container posture but does not authenticate
#   the runner process itself. Restrict which hosts can reach the sockguard
#   listener via clients.allowed_cidrs (TCP) or clients.unix_peer_profiles
#   (unix socket) so only the runner daemon — not arbitrary processes on the
#   same host — can send requests through the proxy.

upstream:
  socket: /var/run/docker.sock

log:
  level: info
  format: json
  access_log: true

health:
  enabled: true
  path: /health

# Exec without pinned AllowedCommands requires insecure_allow_body_blind_writes;
# log/attach streaming requires insecure_allow_read_exfiltration. Both flags
# acknowledge deliberate trade-offs: the runner must be able to execute arbitrary
# job steps (not a fixed command list) and stream job output via the logs and
# attach APIs. Restrict the proxy socket to the runner process UID/IP via
# clients.unix_peer_profiles or clients.allowed_cidrs to keep the risk bounded.
insecure_allow_body_blind_writes: true
insecure_allow_read_exfiltration: true

# Response redactions: ON by default. The runner does not re-submit inspect
# payloads verbatim the way Watchtower/Drydock do, so redacting host paths,
# env vars, and network topology from read responses is safe and reduces the
# blast radius of a compromised job container that tries to enumerate the host
# through the API.
response:
  redact_container_env: true
  redact_mount_paths: true
  redact_network_topology: true
  redact_sensitive_data: true
  deny_verbosity: minimal

request_body:
  container_create:
    # Privileged containers are rejected unconditionally — see security note
    # above. Remove this line only after reading that note carefully.
    allow_privileged: false

    # Host namespaces: all off. CI jobs have no business sharing the host
    # network, PID, IPC, or user namespace.
    allow_host_network: false
    allow_host_pid: false
    allow_host_ipc: false
    allow_host_userns: false

    # Bind mounts: default-empty. The runner should configure named volumes
    # (cache_dir, builds_dir) in config.toml rather than bind-mounting host
    # paths. Populate this list if your specific runner config requires a host
    # path (e.g. "/srv/gitlab-runner/cache:/cache"), keeping entries as narrow
    # as possible.
    allowed_bind_mounts: []

    # Devices: off. GPU-enabled runner configs that pass DeviceRequests
    # (nvidia driver) must set allow_device_requests: true and populate
    # allowed_device_requests with the specific driver + capability set.
    allow_all_devices: false
    allowed_devices: []
    allow_device_requests: false
    allowed_device_requests: []
    allow_device_cgroup_rules: false
    allowed_device_cgroup_rules: []

    # Capabilities: default-deny. CI workloads that compile kernel modules,
    # run strace, or perform raw network operations may need specific entries
    # here (e.g. "SYS_PTRACE" for debugger-assisted builds). Add only what
    # individual jobs have demonstrated they need.
    allow_all_capabilities: false
    allowed_capabilities: []
    require_drop_all_capabilities: false

    # Seccomp + AppArmor: deny unconfined. Jobs that need a custom seccomp
    # profile can pin it via allowed_seccomp_profiles; unconfined stays denied.
    deny_unconfined_seccomp: true
    deny_unconfined_apparmor: true

    # no_new_privileges: enforce across all job containers.
    require_no_new_privileges: true

    # Resource limits: not enforced here — GitLab runner's own resource limit
    # configuration in config.toml (memory, cpu_shares) is the authoritative
    # gate. Flip require_memory_limit / require_cpu_limit to true if you want
    # sockguard to independently verify that every container request carries
    # explicit limits.
    require_memory_limit: false
    require_cpu_limit: false
    require_pids_limit: false

    # Sysctls: off. Rare in standard CI workflows; enable only for jobs that
    # explicitly require kernel parameter tuning.
    allow_sysctls: false

    # Image trust: off by default. Enable mode: enforce and configure
    # allowed_signing_keys or allowed_keyless to gate untrusted images when
    # your pipeline operates on a controlled image registry.
    image_trust:
      mode: "off"

  exec:
    # The runner injects job steps via exec — this is the primary execution
    # mechanism of the docker executor and must remain allowed. Privileged exec
    # is still denied; the runner never requests it in normal operation.
    allow_privileged: false
    # Most official CI images (alpine, ubuntu, node, python) run job scripts
    # as root. Set allow_root_user: false if your pipeline enforces a non-root
    # image standard; pair with allowed_commands to pin the permitted argv.
    allow_root_user: true

  image_pull:
    # Jobs pull images from arbitrary registries declared in .gitlab-ci.yml.
    # allow_all_registries keeps the runner from having to enumerate every
    # registry your pipelines might use. If your org gates pulls to a specific
    # registry proxy, set allow_all_registries: false and populate
    # allowed_registries with that host (e.g. "registry.example.com").
    allow_all_registries: true

rules:
  # Ping, version, info — runner polls these at startup and during job prep.
  - match: { method: GET, path: "/_ping" }
    action: allow
  - match: { method: HEAD, path: "/_ping" }
    action: allow
  - match: { method: GET, path: "/version" }
    action: allow
  - match: { method: GET, path: "/info" }
    action: allow

  # Events — runner monitors container state transitions to detect job
  # container exits and service container readiness.
  - match: { method: GET, path: "/events" }
    action: allow

  # Container reads — list + inspect + logs + stats. The runner streams job
  # output via /containers/*/logs and /containers/*/attach; both are required
  # for the job trace to appear in the GitLab UI.
  - match: { method: GET, path: "/containers/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/logs" }
    action: allow
  - match: { method: GET, path: "/containers/*/stats" }
    action: allow
  - match: { method: GET, path: "/containers/*/top" }
    action: allow
  - match: { method: GET, path: "/containers/*/changes" }
    action: allow

  # Container creation — spawns build, service, and helper containers. Body
  # is inspected by the container_create block above.
  - match: { method: POST, path: "/containers/create" }
    action: allow

  # Container lifecycle — start, stop, kill, wait, remove.
  - match: { method: POST, path: "/containers/*/start" }
    action: allow
  - match: { method: POST, path: "/containers/*/stop" }
    action: allow
  - match: { method: POST, path: "/containers/*/kill" }
    action: allow
  - match: { method: POST, path: "/containers/*/wait" }
    action: allow
  - match: { method: DELETE, path: "/containers/*" }
    action: allow

  # Attach — log streaming for live job output. The runner opens an attach
  # stream to the build container to forward stdout/stderr to the job trace.
  - match: { method: POST, path: "/containers/*/attach" }
    action: allow

  # Exec — job-step injection. The runner creates an exec instance on the
  # build container (/containers/*/exec), starts it (/exec/*/start), and
  # inspects the result (/exec/*/json) to report exit codes. Body inspection
  # for exec is configured in the exec block above.
  - match: { method: POST, path: "/containers/*/exec" }
    action: allow
  - match: { method: POST, path: "/exec/*/start" }
    action: allow
  - match: { method: GET, path: "/exec/*/json" }
    action: allow

  # Image reads — list + inspect + history. Image names can include registry
  # prefixes and slashes (registry.example.com/owner/repo:tag), so the middle
  # segment uses ** to match across slashes. /images/get and /images/*/get
  # (raw tarball export) are intentionally omitted.
  - match: { method: GET, path: "/images/json" }
    action: allow
  - match: { method: GET, path: "/images/**/json" }
    action: allow
  - match: { method: GET, path: "/images/**/history" }
    action: allow

  # Image pull — pulls job images and the helper image. Body is inspected by
  # the image_pull block above (allow_all_registries: true).
  - match: { method: POST, path: "/images/create" }
    action: allow

  # Image remove — the runner prunes job images after each pipeline when
  # pull_policy = "always" or image cleanup is configured.
  - match: { method: DELETE, path: "/images/**" }
    action: allow

  # Network lifecycle — the runner creates a per-job network, attaches the
  # build + service containers, and tears it down on job completion.
  - match: { method: GET, path: "/networks" }
    action: allow
  - match: { method: GET, path: "/networks/*" }
    action: allow
  - match: { method: POST, path: "/networks/create" }
    action: allow
  - match: { method: DELETE, path: "/networks/*" }
    action: allow
  - match: { method: POST, path: "/networks/*/connect" }
    action: allow
  - match: { method: POST, path: "/networks/*/disconnect" }
    action: allow

  # Volume reads + lifecycle — cache and builds volumes.
  - match: { method: GET, path: "/volumes" }
    action: allow
  - match: { method: GET, path: "/volumes/*" }
    action: allow
  - match: { method: POST, path: "/volumes/create" }
    action: allow
  - match: { method: DELETE, path: "/volumes/*" }
    action: allow

  # Deny everything else: build, swarm, secrets, configs, plugins, raw
  # archive/export, service management, and any future Docker API surface.
  - match: { method: "*", path: "/**" }
    action: deny
    reason: "not allowed by gitlab-runner preset"
