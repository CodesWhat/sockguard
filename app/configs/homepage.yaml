# Sockguard — Homepage Preset
#
# Read-only access for Homepage dashboard (gethomepage.dev).
# Allows: container list, inspect, stats, events.
# Includes Swarm endpoints (services, tasks) for Swarm deployments.

upstream:
  socket: /var/run/docker.sock

log:
  level: info
  format: json
  access_log: true

health:
  enabled: true
  path: /health

# Preserve broad Homepage read compatibility, including raw archive/export paths.
insecure_allow_read_exfiltration: true

rules:
  # Health and metadata
  - match: { method: GET, path: "/_ping" }
    action: allow
  - match: { method: HEAD, path: "/_ping" }
    action: allow
  - match: { method: GET, path: "/version" }
    action: allow
  - match: { method: GET, path: "/info" }
    action: allow
  - match: { method: GET, path: "/events" }
    action: allow

  # Container read (list, inspect, stats)
  - match: { method: GET, path: "/containers/**" }
    action: allow

  # Image read (for image info display)
  - match: { method: GET, path: "/images/**" }
    action: allow

  # Swarm endpoints (for Swarm deployments)
  - match: { method: GET, path: "/services/**" }
    action: allow
  - match: { method: GET, path: "/tasks/**" }
    action: allow

  # Deny everything else
  - match: { method: "*", path: "/**" }
    action: deny
    reason: "not allowed by homepage preset — read-only access only"
