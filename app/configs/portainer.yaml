# Sockguard — Portainer Preset
#
# Full Docker API access for Portainer management UI.
# Portainer proxies the entire Docker API — it needs everything.
#
# WARNING: This preset grants near-full Docker socket access.
# Use client CIDR gates or client-container label ACLs to restrict other consumers.

upstream:
  socket: /var/run/docker.sock

log:
  level: info
  format: json
  access_log: true

health:
  enabled: true
  path: /health

# Portainer needs broad Docker write access, including body-sensitive endpoints
# such as container create, exec, build, and swarm management. Container-create
# bodies are inspected by default, but bind-mounted workloads are denied until
# you allowlist their host paths here. Exec, build, and swarm-management
# request bodies are still body-blind today, so this preset keeps the unsafe
# opt-in below.
request_body:
  container_create:
    allowed_bind_mounts: []

insecure_allow_body_blind_writes: true

rules:
  # Health and metadata
  - match: { method: "*", path: "/_ping" }
    action: allow
  - match: { method: GET, path: "/version" }
    action: allow
  - match: { method: GET, path: "/info" }
    action: allow
  - match: { method: GET, path: "/events" }
    action: allow

  # Containers (full lifecycle)
  - match: { method: "*", path: "/containers/**" }
    action: allow

  # Images (full management)
  - match: { method: "*", path: "/images/**" }
    action: allow

  # Networks (full management)
  - match: { method: "*", path: "/networks/**" }
    action: allow

  # Volumes (full management)
  - match: { method: "*", path: "/volumes/**" }
    action: allow

  # Exec (into containers)
  - match: { method: "*", path: "/exec/**" }
    action: allow

  # System
  - match: { method: GET, path: "/system/**" }
    action: allow

  # Build, commit, auth
  - match: { method: POST, path: "/build" }
    action: allow
  - match: { method: POST, path: "/commit" }
    action: allow
  - match: { method: POST, path: "/auth" }
    action: allow

  # Distribution
  - match: { method: GET, path: "/distribution/**" }
    action: allow

  # Swarm (if applicable)
  - match: { method: "*", path: "/swarm/**" }
    action: allow
  - match: { method: "*", path: "/services/**" }
    action: allow
  - match: { method: GET, path: "/tasks/**" }
    action: allow
  - match: { method: "*", path: "/nodes/**" }
    action: allow
  - match: { method: "*", path: "/configs/**" }
    action: allow
  - match: { method: "*", path: "/secrets/**" }
    action: allow

  # Plugins
  - match: { method: "*", path: "/plugins/**" }
    action: allow

  # Deny everything else
  - match: { method: "*", path: "/**" }
    action: deny
    reason: "not allowed by portainer preset"
