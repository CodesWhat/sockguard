# Sockguard — Default Configuration
#
# Default posture: DENY ALL
# Everything must be explicitly allowed.
# Rules are evaluated in order. First match wins.

upstream:
  socket: /var/run/docker.sock

log:
  level: info        # debug, info, warn, error
  format: json       # json, text
  output: stderr     # stderr, stdout, or local relative file path
  access_log: true   # log every request

health:
  enabled: true
  path: /health
  watchdog:
    enabled: false
    interval: 5s
  # /health caches upstream reachability for 2s to reduce probe-induced dial churn.
  # The optional watchdog actively probes Docker, logs state transitions, and warms /health.

metrics:
  enabled: false
  path: /metrics
  # Opt-in Prometheus text metrics. Served locally and never forwarded to Docker.

admin:
  enabled: false                 # Opt-in: POST <path> validates a candidate YAML config
  path: /admin/validate          # Must not collide with health.path or metrics.path
  max_body_bytes: 524288         # Hard cap on candidate-config size (default 512 KiB)
  # Running policy is NEVER mutated by the admin endpoint. The handler shares the
  # main listener, so the listener's CIDR allowlist, mTLS posture, and per-profile
  # rate-limit caps all apply to admin callers. Useful as a CI gate:
  #   curl --data-binary @candidate.yaml http://127.0.0.1:2375/admin/validate

rules:
  # Always safe — health probes
  - match: { method: GET, path: "/_ping" }
    action: allow
  - match: { method: HEAD, path: "/_ping" }
    action: allow

  # Version info
  - match: { method: GET, path: "/version" }
    action: allow

  # Event stream (used by most consumers)
  - match: { method: GET, path: "/events" }
    action: allow

  # Deny everything else
  - match: { method: "*", path: "/**" }
    action: deny
    reason: "no matching allow rule"
