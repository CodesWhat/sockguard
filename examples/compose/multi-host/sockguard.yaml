# examples/compose/multi-host/sockguard.yaml
#
# Standalone example config — not mirroring any shipped preset in app/configs/.
# Demonstrates the upstream.endpoints failover block for remote Docker daemons
# over TCP+TLS. Adjust addresses, cert paths, and rules for your environment.
#
# Both endpoints must point to the same logical daemon or Swarm cluster.
# Sockguard picks the first healthy endpoint and only switches on failure.

upstream:
  endpoints:
    - address: tcp://dockerd-primary:2376
      tls:
        ca_file: /certs/ca.pem      # CA cert that signed the daemon's server cert
        cert_file: /certs/cert.pem  # client cert for mutual TLS
        key_file: /certs/key.pem
    - address: tcp://dockerd-standby:2376
      tls:
        ca_file: /certs/ca.pem
        cert_file: /certs/cert.pem
        key_file: /certs/key.pem
  failover:
    health_interval: "5s"
    health_timeout: "2s"

log:
  level: info
  format: json
  access_log: true

health:
  enabled: true
  path: /health

rules:
  # Ping and version — needed by most clients for connection setup.
  - match: { method: GET, path: "/_ping" }
    action: allow
  - match: { method: HEAD, path: "/_ping" }
    action: allow
  - match: { method: GET, path: "/version" }
    action: allow
  - match: { method: GET, path: "/info" }
    action: allow

  # Events stream — read-only; required by monitoring and compose tools.
  - match: { method: GET, path: "/events" }
    action: allow

  # Containers — list, inspect, stats, logs. No exec, no archive streams.
  - match: { method: GET, path: "/containers/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/stats" }
    action: allow
  - match: { method: GET, path: "/containers/*/top" }
    action: allow
  - match: { method: GET, path: "/containers/*/changes" }
    action: allow

  # Container lifecycle writes.
  - match: { method: POST, path: "/containers/*/start" }
    action: allow
  - match: { method: POST, path: "/containers/*/stop" }
    action: allow
  - match: { method: POST, path: "/containers/*/restart" }
    action: allow
  - match: { method: POST, path: "/containers/*/kill" }
    action: allow
  - match: { method: POST, path: "/containers/*/rename" }
    action: allow
  - match: { method: POST, path: "/containers/*/update" }
    action: allow
  - match: { method: POST, path: "/containers/*/wait" }
    action: allow
  - match: { method: DELETE, path: "/containers/*" }
    action: allow
  - match: { method: POST, path: "/containers/create" }
    action: allow

  # Images — inspect, history, pull, remove. No build.
  - match: { method: GET, path: "/images/json" }
    action: allow
  - match: { method: GET, path: "/images/**/json" }
    action: allow
  - match: { method: GET, path: "/images/**/history" }
    action: allow
  - match: { method: POST, path: "/images/create" }
    action: allow
  - match: { method: DELETE, path: "/images/**" }
    action: allow

  # Networks and volumes — read-only.
  - match: { method: GET, path: "/networks" }
    action: allow
  - match: { method: GET, path: "/networks/*" }
    action: allow
  - match: { method: GET, path: "/volumes" }
    action: allow
  - match: { method: GET, path: "/volumes/*" }
    action: allow

  # Swarm service reads — for cluster-aware tooling.
  - match: { method: GET, path: "/services" }
    action: allow
  - match: { method: GET, path: "/services/*" }
    action: allow

  # Catch-all deny. Everything not explicitly allowed above is blocked.
  - match: { method: "*", path: "/**" }
    action: deny
    reason: "not allowed by multi-host example policy"
