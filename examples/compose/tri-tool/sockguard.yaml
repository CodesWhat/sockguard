# Sockguard config for the tri-tool stack (sockguard -> Portwing -> drydock).
# Mirrors the shipped Portwing preset — this is the same rule set as
# examples/compose/portwing/sockguard.yaml (a copy of app/configs/portwing.yaml),
# embedded here so the compose stack is self-contained. Update all three files
# together if you change rules.
#
# Log streaming: GET /containers/{id}/logs is required by Portwing's
# GetContainerLogs() API. insecure_allow_read_exfiltration: true acknowledges
# that container logs can contain secrets; see app/configs/portwing.yaml for
# the full security-tradeoff rationale.
#
# Redaction is disabled below (not the default-safe posture) because drydock,
# in standard mode, reads container inspect data forwarded through Portwing to
# recreate containers during updates. See the README's "Redaction note" for
# the standalone-Portwing alternative.

upstream:
  socket: /var/run/docker.sock

log:
  level: info
  format: json
  access_log: true

health:
  enabled: true
  path: /health

response:
  redact_mount_paths: false
  redact_container_env: false
  redact_network_topology: false

insecure_allow_read_exfiltration: true

request_body:
  container_create:
    allowed_bind_mounts: []
    allowed_runtimes:
      - runc
  image_pull:
    allow_all_registries: true

rules:
  - match: { method: GET, path: "/_ping" }
    action: allow
  - match: { method: HEAD, path: "/_ping" }
    action: allow
  - match: { method: GET, path: "/version" }
    action: allow
  - match: { method: GET, path: "/info" }
    action: allow
  - match: { method: GET, path: "/events" }
    action: allow

  - match: { method: GET, path: "/containers/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/json" }
    action: allow
  - match: { method: GET, path: "/containers/*/logs" }
    action: allow
  - match: { method: GET, path: "/containers/*/stats" }
    action: allow
  - match: { method: GET, path: "/containers/*/top" }
    action: allow
  - match: { method: GET, path: "/containers/*/changes" }
    action: allow

  - match: { method: POST, path: "/containers/*/start" }
    action: allow
  - match: { method: POST, path: "/containers/*/stop" }
    action: allow
  - match: { method: POST, path: "/containers/*/restart" }
    action: allow
  - match: { method: POST, path: "/containers/*/kill" }
    action: allow
  - match: { method: POST, path: "/containers/*/rename" }
    action: allow
  - match: { method: POST, path: "/containers/*/update" }
    action: allow
  - match: { method: POST, path: "/containers/*/wait" }
    action: allow
  - match: { method: DELETE, path: "/containers/*" }
    action: allow
  - match: { method: POST, path: "/containers/create" }
    action: allow

  - match: { method: GET, path: "/images/json" }
    action: allow
  - match: { method: GET, path: "/images/**/json" }
    action: allow
  - match: { method: GET, path: "/images/**/history" }
    action: allow
  - match: { method: POST, path: "/images/create" }
    action: allow
  - match: { method: DELETE, path: "/images/**" }
    action: allow

  - match: { method: GET, path: "/networks" }
    action: allow
  - match: { method: GET, path: "/networks/*" }
    action: allow

  - match: { method: GET, path: "/volumes" }
    action: allow
  - match: { method: GET, path: "/volumes/*" }
    action: allow

  - match: { method: GET, path: "/distribution/**/json" }
    action: allow

  - match: { method: GET, path: "/services" }
    action: allow
  - match: { method: GET, path: "/services/*" }
    action: allow

  - match: { method: "*", path: "/**" }
    action: deny
    reason: "not allowed by portwing preset"
