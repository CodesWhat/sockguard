---
# Lefthook configuration for sockguard monorepo.
#
# Pre-push pipeline (piped = sequential, fail-fast):
#   1. Clean-tree check (no stray artifacts before push)
#   2. GoReleaser snapshot dry-run (full release pipeline, skip publish)
#   3. Go lint + test
#   4. Go fuzz smoke (5 s per fuzzer, all 8 fuzzers) — tier 0 of the
#      fuzz strategy. Catches broken fuzz drivers and stale seed corpora
#      before the push even leaves the machine. The real coverage tiers
#      are in `.github/workflows/ci-verify.yml` (60 s per fuzzer in a
#      matrix, on every PR/push), `quality-fuzz-nightly.yml` (15 min
#      per fuzzer, daily), and `quality-fuzz-monthly.yml` (1 h per
#      fuzzer, monthly + manual).
#   5. Lockfile dedupe check (catches orphaned hoisted packages)
#   6. Knip (unused files/exports/deps in TS workspaces)
#   7. Biome lint for TS/JS
#   8. TS workspace tests
#   9. Build all workspaces
#  10. Zizmor (workflow security)

pre-commit:
  piped: true
  commands:
    biome-fix:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: npx biome check --fix --no-errors-on-unmatched {staged_files} && git add {staged_files}
      priority: 1
    biome-format:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: npx biome format --write --no-errors-on-unmatched {staged_files} && git add {staged_files}
      priority: 2

commit-msg:
  commands:
    convention:
      run: node scripts/validate-commit-msg.mjs {1}
      fail_text: "Commit message does not follow Gitmoji + Conventional Commits format"

pre-push:
  piped: true
  commands:
    clean-tree:
      run: |
        if ! git diff --quiet --exit-code || ! git diff --cached --quiet --exit-code; then
          echo "Uncommitted changes detected — commit or stash before pushing."
          exit 1
        fi
      fail_text: "Uncommitted changes detected"
      priority: 0
      timeout: 10s

    # Full release dry-run — mirrors what release-from-tag.yml runs in CI,
    # minus publish. Catches goreleaser config, build, archive, and dirty-tree
    # bugs locally before they surface in a tagged release.
    goreleaser-snapshot:
      run: cd app && goreleaser release --snapshot --clean --skip=publish
      skip:
        - run: '! command -v goreleaser >/dev/null 2>&1'
      priority: 1
      timeout: 3m

    go-lint:
      run: cd app && golangci-lint run
      priority: 2
      timeout: 1m

    go-test:
      run: cd app && go test -race ./...
      priority: 3
      timeout: 3m

    # Fuzz smoke — 5 s per fuzzer, all 8 in series. Tier 0 of the fuzz
    # strategy: catches broken fuzz drivers and stale seed corpora before
    # the push leaves the machine. Real coverage (60 s, 15 min, 1 h)
    # happens in the ci-verify + quality-fuzz-{nightly,monthly} workflows.
    # -timeout=0 disables the test binary's default 10-min timeout so
    # fuzztime is the only budget knob; fail-fast is inherent from set -e.
    go-fuzz:
      run: |
        cd app && set -e
        for entry in \
          "FuzzPathMatch ./internal/filter/" \
          "FuzzGlobToRegex ./internal/filter/" \
          "FuzzNormalizePath ./internal/filter/" \
          "FuzzCompileRule ./internal/filter/" \
          "FuzzLoadYAML ./internal/config/" \
          "FuzzProxyHeadersAndBody ./internal/proxy/" \
          "FuzzHijackHeadersAndBody ./internal/proxy/" \
          "FuzzHijackBidirectionalStream ./internal/proxy/"; do
          set -- $entry
          go test -run='^$' -fuzz="^$1\$" -fuzztime=5s -timeout=0 "$2"
        done
      priority: 4
      timeout: 2m

    # Lockfile hygiene — catches orphaned hoisted packages (e.g. a stale
    # next@15.5.15 left behind after a version bump) before they ship to
    # CI and get flagged by Snyk. Non-mutating: --dry-run only reports
    # what `npm dedupe` would change; we fail the push if anything would.
    lockfile-dedupe:
      run: |
        out=$(npm dedupe --dry-run --json 2>&1)
        if ! printf '%s\n' "$out" | node -e '
          const fs = require("node:fs");
          const out = fs.readFileSync(0, "utf8");
          const jsonStart = out.indexOf("{");
          if (jsonStart === -1) process.exit(1);

          const report = JSON.parse(out.slice(jsonStart));
          const postcssOverridePath = "/node_modules/next/node_modules/postcss";
          const workspacePostcssPaths = [
            "/docs/node_modules/postcss",
            "/website/node_modules/postcss",
          ];
          const isIgnoredPostcssOverrideDrift = (entry) => {
            const from = entry.from ?? entry;
            const to = entry.to ?? entry;
            const isNextOverrideDowngrade = from.name === "postcss" &&
              to.name === "postcss" &&
              from.path?.endsWith(postcssOverridePath) &&
              to.path?.endsWith(postcssOverridePath) &&
              from.version === "8.5.10" &&
              to.version === "8.4.31";
            const isWorkspacePostcssHoist = entry.name === "postcss" &&
              entry.version === "8.5.10" &&
              workspacePostcssPaths.some((path) => entry.path?.endsWith(path));
            return isNextOverrideDowngrade || isWorkspacePostcssHoist;
          };

          const drift = [
            ...(report.add ?? []).filter((entry) => !isIgnoredPostcssOverrideDrift(entry)),
            ...(report.remove ?? []).filter((entry) => !isIgnoredPostcssOverrideDrift(entry)),
            ...(report.change ?? []).filter((entry) => !isIgnoredPostcssOverrideDrift(entry)),
          ];

          process.exit(drift.length === 0 ? 0 : 1);
        '; then
          echo "Lockfile drift detected — run 'npm dedupe' and commit the result:"
          echo "$out"
          exit 1
        fi
      priority: 5
      timeout: 30s

    # Knip — finds unused files, exports, types, and unlisted/unused
    # dependencies across the TS workspaces. Catches dead code and
    # phantom deps that biome/tsc don't see. Config in knip.json.
    knip:
      run: npx knip
      priority: 6
      timeout: 1m

    biome:
      run: npx biome check .
      priority: 7
      timeout: 30s

    ts-test:
      run: npm test
      priority: 8
      timeout: 1m

    build:
      run: npx turbo build
      priority: 9
      timeout: 3m

    zizmor:
      glob: '.github/workflows/*.yml'
      run: zizmor .github/workflows/
      skip:
        - run: '! command -v zizmor >/dev/null 2>&1'
      priority: 10
      timeout: 30s
